apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-worker
  namespace: default
  labels:
    app: telemetry-worker
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: telemetry-worker
      version: v1
  template:
    metadata:
      labels:
        app: telemetry-worker
        version: v1
    spec:
      serviceAccountName: telemetry-worker
      terminationGracePeriodSeconds: 30
      
      # Endurecimiento de la seguridad a nivel de Pod
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        runAsGroup: 1654
        fsGroup: 1654
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: worker
        image: telemetry-worker:v1.0.0 # Tag inmutable
        imagePullPolicy: IfNotPresent

        ports:
        - name: http
          containerPort: 8080
          protocol: TCP

        env:
        - name: RABBITMQ_HOST
          valueFrom:
            configMapKeyRef:
              name: telemetry-config
              key: rabbitmq.host
        - name: RABBITMQ_USER
          valueFrom:
            secretKeyRef:
              name: telemetry-secrets
              key: rabbitmq.user
        - name: RABBITMQ_PASS
          valueFrom:
            secretKeyRef:
              name: telemetry-secrets
              key: rabbitmq.pass
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"

        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15 # Optimizado para el cold start de .NET
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2

        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

        # El UID (1654) con el usuario 'app' de .NET 8/9
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1654
          runAsGroup: 1654
          capabilities:
            drop:
            - ALL

        volumeMounts:
        - name: tmp
          mountPath: /tmp

      volumes:
      - name: tmp
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: telemetry-worker
  namespace: default
  labels:
    app: telemetry-worker
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  selector:
    app: telemetry-worker
    version: v1

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: telemetry-worker
  namespace: default
  # Deshabilitar el automount del token de la API de K8s si no se requiere
  automountServiceAccountToken: false

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: telemetry-worker
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: telemetry-worker
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 15
      selectPolicy: Max

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: telemetry-config
  namespace: default
data:
  rabbitmq.host: "rabbitmq.default.svc.cluster.local"

---
# NOTA: Credenciales no debe estar en texto plano.
# Debe ser inyectado mediante Azure Key Vault, AWS Secrets Manager o SealedSecrets.
apiVersion: v1
kind: Secret
metadata:
  name: telemetry-secrets
  namespace: default
type: Opaque
stringData:
  rabbitmq.user: "guest"
  rabbitmq.pass: "guest"

---
# NetworkPolicy para aislar el pod en la red del cluster
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: telemetry-worker-policy
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: telemetry-worker
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector: {} # Permite trafico de balanceadores internos o servicios del mismo namespace
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - {} # Permite salida libre (necesaria para conectarse a RabbitMQ externo o APIs)
